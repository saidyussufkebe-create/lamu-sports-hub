<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lamu Sports Hub</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
transition:0.3s;
}

header{
background:#0a3d62;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.hero{
padding:60px;
text-align:center;
background:#f4f4f4;
}

section{
padding:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

footer{
background:#0a3d62;
color:white;
text-align:center;
padding:20px;
}

/* dark theme */

.dark{
background:#121212;
color:white;
}

.dark .hero{
background:#1e1e1e;
}

.dark .card{
background:#2b2b2b;
}

</style>
</head>
